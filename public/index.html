<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>CORE CS2 STATS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px solid orange; display: inline-block; min-width: 300px; }
        h1 { color: orange; letter-spacing: 2px; }
        .stat { font-size: 1.3rem; margin: 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; }
        span { color: orange; font-weight: bold; margin-left: 20px; }
        #loading { color: #888; }
    </style>
</head>
<body>

    <div class="box">
        <h1>MOJE ŠTATISTIKY</h1>
        <div id="loading">Načítavam dáta...</div>
        
        <div id="stats-content" style="display:none;">
            <div class="stat">Odohraný čas: <span id="time">0</span></div>
            <div class="stat">Zabitia (Kills): <span id="kills">0</span></div>
            <div class="stat">Vyhrané zápasy: <span id="wins">0</span></div>
            <div class="stat">Headshoty: <span id="hs">0</span></div>
            <div class="stat">K/D Ratio: <span id="kd">0</span></div>
        </div>
    </div>

    <script>
        const MY_ID = "76561198740226614"; 

        async function load() {
            try {
                const res = await fetch(`/api/stats/${MY_ID}`);
                const data = await res.json();

                // 1. Čas už funguje, tak ho len priradíme
                document.getElementById('time').innerText = data.hours + " hodín";

                // 2. Oprava kľúčov pre štatistiky
                // Steam API používa presne tieto názvy:
                const find = (name) => data.stats.find(s => s.name === name)?.value || 0;

                const kills = find('total_kills');
                const deaths = find('total_deaths');
                const wins = find('total_wins');
                const hs = find('total_kills_headshot');

                // Výpočet KD Ratio (killy deleno úmrtia)
                const kd = deaths > 0 ? (kills / deaths).toFixed(2) : kills;

                // 3. Vloženie do stránky
                document.getElementById('kills').innerText = kills.toLocaleString();
                document.getElementById('wins').innerText = wins.toLocaleString();
                document.getElementById('hs').innerText = hs.toLocaleString();
                document.getElementById('kd').innerText = kd;

                // Zobrazenie obsahu
                document.getElementById('loading').style.display = 'none';
                document.getElementById('stats-content').style.display = 'block';

            } catch (e) {
                document.getElementById('loading').innerText = "Chyba pri načítaní dát.";
                console.error(e);
            }
        }
        window.onload = load;
    </script>
</body>
</html>
