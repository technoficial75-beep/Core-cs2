<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>CS2 Stats Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 30px; }
        .box { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 2px solid orange; display: inline-block; width: 350px; }
        input { padding: 10px; width: 70%; border-radius: 5px; border: 1px solid #444; background: #222; color: white; margin-bottom: 10px; }
        button { padding: 10px; background: orange; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .stat-grid { margin-top: 20px; text-align: left; }
        .stat-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        .val { color: orange; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h1>CS2 TRACKER</h1>
        <input type="text" id="steamInput" placeholder="Vlož SteamID..." value="76561198740226614">
        <button onclick="loadStats()">Hľadaj</button>

        <div id="stats-content" style="margin-top:20px;">
            <div class="stat-grid">
                <div class="stat-item">Čas v knižnici: <span class="val" id="time">0 h</span></div>
                <div class="stat-item">Killy (Všetky): <span class="val" id="kills">0</span></div>
                <div class="stat-item">Vyhrané zápasy: <span class="val" id="wins">0</span></div>
                <div class="stat-item">MVP Tituly: <span class="val" id="mvp">0</span></div>
                <div class="stat-item">Bomby plantnuté: <span class="val" id="bombs">0</span></div>
            </div>
        </div>
    </div>

    <script>
        async function loadStats() {
            const id = document.getElementById('steamInput').value;
            if (!id) return;

            try {
                const res = await fetch(`/api/stats/${id}`);
                const data = await res.json();

                // Čas z knižnice (32h)
                document.getElementById('time').innerText = (data.hours || 0) + " h";

                const find = (name) => data.stats.find(s => s.name === name)?.value || 0;

                // Tu vyťahujeme dáta - niektoré sú "čistejšie" ako killy
                document.getElementById('kills').innerText = find('total_kills').toLocaleString();
                document.getElementById('wins').innerText = find('total_wins').toLocaleString();
                document.getElementById('mvp').innerText = find('total_mvps').toLocaleString();
                document.getElementById('bombs').innerText = find('total_planted_bombs').toLocaleString();

            } catch (e) {
                alert("Chyba: Skontroluj ID alebo súkromie profilu.");
            }
        }

        // Automaticky načíta tvoje ID pri štarte
        window.onload = loadStats;
    </script>
</body>
</html>
