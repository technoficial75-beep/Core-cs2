<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Moje CS2 Štatistiky</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .container { background: #1e1e1e; display: inline-block; padding: 30px; border-radius: 15px; border: 1px solid orange; box-shadow: 0 0 20px rgba(255,165,0,0.2); }
        h1 { color: orange; margin-bottom: 20px; }
        .stat { font-size: 1.2rem; margin: 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        span { color: orange; font-weight: bold; float: right; margin-left: 20px; }
        #loading { color: gray; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <h1>CORE CS2 STATS</h1>
        <div id="loading">Načítavam dáta zo Steamu...</div>
        
        <div id="stats-content" style="display:none;">
            <div class="stat">Odohraný čas: <span id="txt_time">0</span></div>
            <div class="stat">Celkové killy: <span id="txt_kills">0</span></div>
            <div class="stat">Výhry: <span id="txt_wins">0</span></div>
            <div class="stat">Headshoty: <span id="txt_hs">0</span></div>
        </div>
    </div>

    <script>
        // TU VLOŽ SVOJE ID NA TRVALO
        const MY_STEAM_ID = "76561198740226614"; 

        async function loadMyStats() {
            try {
                const res = await fetch(`/api/stats/${MY_STEAM_ID}`);
                const data = await res.json();

                if (data.error) throw new Error("Chyba");

                // Skryjeme nápis načítavania a ukážeme štatistiky
                document.getElementById('loading').style.display = 'none';
                document.getElementById('stats-content').style.display = 'block';

                // Vložíme dáta
                document.getElementById('txt_time').innerText = data.hours + " hodín";

                const find = (name) => data.stats.find(s => s.name === name)?.value || 0;

                document.getElementById('txt_kills').innerText = find('total_kills').toLocaleString();
                document.getElementById('txt_wins').innerText = find('total_wins').toLocaleString();
                document.getElementById('txt_hs').innerText = find('total_kills_headshot').toLocaleString();
                
            } catch (e) {
                document.getElementById('loading').innerText = "Chyba: Profil je súkromný alebo server nebeží.";
            }
        }

        // Spustí sa automaticky po načítaní stránky
        window.onload = loadMyStats;
    </script>
</body>
</html>
